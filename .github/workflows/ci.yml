name: .NET CI + Docker

on:
  push:
    branches:
      - main

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
    # Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # Restore
    - name: Restore dependencies
      run: dotnet restore eShopOnWeb.sln

    # Build
    - name: Build solution
      run: dotnet build eShopOnWeb.sln --no-restore --configuration Release

    # Run Tests with Coverage
    - name: Run Tests with Coverage
      run: dotnet test eShopOnWeb.sln --configuration Release --collect:"XPlat Code Coverage"

    # Install ReportGenerator
    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    # Generate HTML Coverage Report
    - name: Generate HTML Coverage Report
      run: |
        reportgenerator \
          -reports:**/coverage.cobertura.xml \
          -targetdir:coveragereport \
          -reporttypes:Html

    # Upload Coverage HTML Artifact
    - name: Upload Coverage HTML Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-html-report
        path: coveragereport

    # Set Docker Image Version = GitHub Run Number
    - name: Set Build Version
      id: version
      run: echo "VERSION=${{ github.run_number }}" >> $GITHUB_OUTPUT

    # Login to Azure Container Registry
    - name: Login to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # Build and Push Docker Image
    - name: Build and Push Docker Image
      run: |
        IMAGE_NAME=${{ secrets.ACR_LOGIN_SERVER }}/eshop:${{ github.run_number }}

        docker build \
        -f src/Web/Dockerfile \
        -t $IMAGE_NAME \
        .

    - name: Scan Docker Image with Trivy
      uses: aquasecurity/trivy-action@0.24.0
      with:
        image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/eshop:${{ github.run_number }}
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Push Docker Image
      run: |
         IMAGE_NAME=${{ secrets.ACR_LOGIN_SERVER }}/eshop:${{ github.run_number }}
         docker push $IMAGE_NAME

